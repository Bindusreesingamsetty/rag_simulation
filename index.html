<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#1e293b;
border-radius:12px;
padding:16px;
box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.card h2{
font-size:18px;
margin-bottom:10px;
color:#38bdf8;
}

textarea,input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
margin-top:6px;
margin-bottom:10px;
}

button{
background:#38bdf8;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#0ea5e9;
}

.output{
background:#0f172a;
padding:10px;
border-radius:8px;
min-height:60px;
font-size:14px;
white-space:pre-wrap;
}

.chunk{
background:#334155;
padding:6px;
margin:4px 0;
border-radius:6px;
}

.vector{
color:#22c55e;
font-size:12px;
}

.answer{
background:#065f46;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<h1>RAG Pipeline Simulator</h1>

<div class="container">

<div class="card">
<h2>1️⃣ Knowledge Base</h2>

<textarea id="documents" rows="6" placeholder="Add documents here...
Example:
Pizza is an Italian dish made with cheese.
Biryani is a famous Indian rice dish.
Sushi is a Japanese seafood dish."></textarea>

<button onclick="processDocs()">Process Documents</button>

<div id="docOutput" class="output"></div>
</div>


<div class="card">
<h2>2️⃣ Chunking</h2>
<div id="chunkOutput" class="output"></div>
</div>


<div class="card">
<h2>3️⃣ Embeddings (Vector DB)</h2>
<div id="vectorOutput" class="output"></div>
</div>


<div class="card">
<h2>4️⃣ Ask a Question</h2>

<input id="query" placeholder="Ask something...">

<button onclick="runQuery()">Search</button>

<div id="queryVector" class="output"></div>
</div>


<div class="card">
<h2>5️⃣ Similarity Search</h2>
<div id="searchOutput" class="output"></div>
</div>


<div class="card">
<h2>6️⃣ Retrieved Context + LLM</h2>
<div id="answerOutput" class="output answer"></div>
</div>


</div>


<script>

let chunks=[]
let vectors=[]

function randomVector(){
return Array.from({length:5},()=>Math.random().toFixed(2))
}

function processDocs(){

let text=document.getElementById("documents").value
let docs=text.split("\n").filter(d=>d.trim()!="")

document.getElementById("docOutput").innerText=
docs.map((d,i)=>`Doc ${i+1}: ${d}`).join("\n")

chunks=[]
docs.forEach(d=>{
let words=d.split(" ")
for(let i=0;i<words.length;i+=5){
chunks.push(words.slice(i,i+5).join(" "))
}
})

document.getElementById("chunkOutput").innerHTML=
chunks.map(c=>`<div class="chunk">${c}</div>`).join("")

vectors=[]
chunks.forEach(c=>{
vectors.push({text:c,vector:randomVector()})
})

document.getElementById("vectorOutput").innerHTML=
vectors.map(v=>`
<div class="chunk">
${v.text}
<div class="vector">[${v.vector.join(", ")}]</div>
</div>
`).join("")

}


function similarity(a,b){

let score=0
for(let i=0;i<a.length;i++){
score+=Math.abs(a[i]-b[i])
}

return 1/(1+score)
}


function runQuery(){

let query=document.getElementById("query").value

let qVector=randomVector()

document.getElementById("queryVector").innerText=
`Query: ${query}

Vector: [${qVector.join(", ")}]`

let scores=vectors.map(v=>{
return{
text:v.text,
score:similarity(qVector,v.vector)
}
})

scores.sort((a,b)=>b.score-a.score)

let top=scores.slice(0,2)

document.getElementById("searchOutput").innerHTML=
top.map(s=>`
<div class="chunk">
${s.text}
<br>
Score: ${s.score.toFixed(2)}
</div>
`).join("")

let context=top.map(t=>t.text).join(" ")

let answer=`Based on retrieved context:

"${context}"

Simulated LLM Answer:
Your question was "${query}". 
The system retrieved the most relevant chunks above and used them as context for the answer.`

document.getElementById("answerOutput").innerText=answer

}

</script>

</body>
</html>
